services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zhixing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zhixing_dev}
      POSTGRES_DB: ${POSTGRES_DB:-zhixing}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:v1.12.5
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  meilisearch:
    image: getmeili/meilisearch:v1.11
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-zhixing_meili_dev_key}
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

volumes:
  pg_data:
  redis_data:
  qdrant_data:
  meili_data:

# Dify 体积大，Phase 1 通过 vendor/dify/docker compose 单独启动
# MetaGPT-X 在宿主机 G:\MetaGPT 运行，不在此 compose 内
