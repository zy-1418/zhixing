<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>知行知识图谱</title>
    <style>
      html,
      body,
      #container {
        height: 100%;
        margin: 0;
        background: #f7f2ea;
        font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      .panel {
        position: absolute;
        z-index: 2;
        left: 16px;
        top: 16px;
        padding: 12px 16px;
        border: 1px solid #e8dfd3;
        border-radius: 16px;
        background: #fffbf5;
        color: #3d3832;
      }
      .panel strong {
        color: #7a2e2a;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <strong>知行知识图谱</strong>
      <div>sigma.js 静态原型</div>
    </div>
    <div id="container"></div>
    <script type="module">
      import Graph from "https://esm.sh/graphology@0.25.4";
      import Sigma from "https://esm.sh/sigma@3.0.1";

      const graph = new Graph();
      graph.addNode("note", {
        label: "电池笔记",
        x: 0,
        y: 0,
        size: 16,
        color: "#7A2E2A",
      });
      graph.addNode("topic", {
        label: "固态电解质",
        x: 1,
        y: 0.5,
        size: 12,
        color: "#B77B57",
      });
      graph.addNode("question", {
        label: "研究问题",
        x: -1,
        y: 0.5,
        size: 12,
        color: "#5C2220",
      });
      graph.addEdge("note", "topic", { label: "MENTIONS", color: "#8A8278" });
      graph.addEdge("topic", "question", { label: "INSPIRES", color: "#8A8278" });

      new Sigma(graph, document.getElementById("container"));
    </script>
  </body>
</html>
