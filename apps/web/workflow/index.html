<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>知行工作流编辑器</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f2ea;
        color: #3d3832;
      }
      .canvas {
        display: grid;
        min-height: 100vh;
        place-items: center;
      }
      .node {
        border: 1px solid #e8dfd3;
        border-radius: 18px;
        background: #fffbf5;
        box-shadow: 0 12px 30px rgb(61 56 50 / 10%);
        padding: 20px 24px;
        min-width: 180px;
      }
      .row {
        align-items: center;
        display: flex;
        gap: 28px;
      }
      .edge {
        color: #7a2e2a;
        font-size: 28px;
      }
    </style>
  </head>
  <body>
    <main class="canvas" aria-label="React Flow placeholder">
      <section class="row">
        <article class="node">输入任务</article>
        <span class="edge">→</span>
        <article class="node">Dify / MetaGPT</article>
        <span class="edge">→</span>
        <article class="node">工作区产物</article>
      </section>
    </main>
  </body>
</html>
