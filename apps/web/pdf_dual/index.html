<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>知行双联 PDF</title>
    <style>
      body {
        margin: 0;
        background: #f7f2ea;
        color: #3d3832;
        font-family: system-ui, sans-serif;
      }
      main {
        display: grid;
        gap: 16px;
        grid-template-columns: 1fr 1fr;
        min-height: 100vh;
        padding: 16px;
      }
      section {
        background: #fffbf5;
        border: 1px solid #e8dfd3;
        border-radius: 18px;
        padding: 24px;
      }
      h1 {
        color: #7a2e2a;
      }
    </style>
  </head>
  <body>
    <main aria-label="pdf.js dual reader placeholder">
      <section>
        <h1>PDF 原文</h1>
        <p>pdf.js 渲染区占位。</p>
      </section>
      <section>
        <h1>联动笔记</h1>
        <p>高亮、摘要与批注会同步到这里。</p>
      </section>
    </main>
  </body>
</html>
