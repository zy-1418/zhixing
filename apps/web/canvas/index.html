<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>知行无限画布</title>
    <style>
      body {
        margin: 0;
        background:
          linear-gradient(#e8dfd3 1px, transparent 1px),
          linear-gradient(90deg, #e8dfd3 1px, transparent 1px),
          #f7f2ea;
        background-size: 32px 32px;
        color: #3d3832;
        font-family: system-ui, sans-serif;
      }
      .card {
        background: #fffbf5;
        border: 1px solid #e8dfd3;
        border-radius: 20px;
        box-shadow: 0 12px 30px rgb(61 56 50 / 12%);
        left: 12vw;
        padding: 20px;
        position: absolute;
        top: 16vh;
        width: 280px;
      }
      .card:nth-child(2) {
        left: 48vw;
        top: 42vh;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>tldraw 占位</h1>
      <p>无限画布模板将在本页替换为 tldraw WebView。</p>
    </section>
    <section class="card">
      <h2>想法节点</h2>
      <p>支持笔记、任务和图谱节点拖拽编排。</p>
    </section>
  </body>
</html>
