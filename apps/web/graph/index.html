<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>知行知识图谱</title>
    <style>
      body {
        margin: 0;
        background: #f7f2ea;
        color: #3d3832;
        font-family: system-ui, sans-serif;
      }
      svg {
        height: 100vh;
        width: 100vw;
      }
      circle {
        fill: #7a2e2a;
      }
      line {
        stroke: #c9b9a4;
        stroke-width: 3;
      }
      text {
        fill: #3d3832;
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <svg role="img" aria-label="sigma.js graph placeholder" viewBox="0 0 800 480">
      <line x1="180" y1="240" x2="400" y2="130"></line>
      <line x1="400" y1="130" x2="620" y2="240"></line>
      <line x1="180" y1="240" x2="620" y2="240"></line>
      <circle cx="180" cy="240" r="38"></circle>
      <circle cx="400" cy="130" r="38"></circle>
      <circle cx="620" cy="240" r="38"></circle>
      <text x="145" y="310">笔记</text>
      <text x="365" y="200">论点</text>
      <text x="585" y="310">任务</text>
    </svg>
  </body>
</html>
